services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iracehub-app
    restart: unless-stopped
    env_file:
      - .env.production
    expose:
      - "2300"

  caddy:
    image: caddy:2.9
    container_name: iracehub-caddy
    restart: unless-stopped
    depends_on:
      - app
    environment:
      - DOMAIN=${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
